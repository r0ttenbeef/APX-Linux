---
- name: TMUX | Copy the tmux.conf file to archlinux box
  copy:
    src: "{{ role_path }}/files/tmux.conf"
    dest: "/home/{{ deploy_user }}/.tmux.conf"
  become: yes
  become_user: "{{ deploy_user }}"

- name: TMUX | Clone tmux-themepack repository
  git:
    repo: https://github.com/jimeh/tmux-themepack.git
    dest: "/home/{{ deploy_user }}/.tmux/plugins/tmux-themepack"
    clone: yes
  become: yes
  become_user: "{{ deploy_user }}"

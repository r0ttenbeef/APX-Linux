---
- name: VIM | Customize the tab width
  lineinfile:
    dest: /etc/vimrc
    line: "{{ item.line }}"
  loop:
    - { line: "set tabstop=4" }
    - { line: "set shiftwidth=4" }
    - { line: "set expandtab" }
  become: yes

- name: VIM | Create autoload and plugged directory
  file:
    path: "/home/{{ deploy_user }}/{{ item.path }}"
    state: directory
  loop:
    - { path: ".vim/autoload" }
    - { path: ".vim/plugged" }
  become: yes
  become_user: "{{ deploy_user }}"

- name: VIM | Install vim plug manager
  get_url:
    url: "https://github.com/junegunn/vim-plug/raw/master/plug.vim"
    dest: "/home/{{ deploy_user }}/.vim/autoload/plug.vim"
  become: yes
  become_user: "{{ deploy_user }}"

- name: VIM | Transfer vim RC file
  copy:
    src: "{{ role_path }}/files/vimrc"
    dest: "/home/{{ deploy_user }}/.vimrc"
  become: yes
  become_user: "{{ deploy_user }}"

- name: VIM | Install plugins
  git:
    repo: "{{ item.url }}"
    dest: "/home/{{ deploy_user }}/.vim/plugged/{{ item.name }}"
    update: yes
    clone: yes
  loop:
    - { name: "vim-airline", url: "https://github.com/vim-airline/vim-airline.git" }
    - { name: "vim-airline-themes", url: "https://github.com/vim-airline/vim-airline-themes.git" }
  become: yes
  become_user: "{{ deploy_user }}"

- name: VIM | Apply installed plugins
  command: vim +PlugInstall +qall
  changed_when: true
  become: yes
  become_user: "{{ deploy_user }}"